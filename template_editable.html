      <style>
        * {
          box-sizing: border-box;
          -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
          margin: 0;
          padding: 0;
          background: #FAF8F4;
        }

        ::-webkit-scrollbar {
          width: 0;
          height: 0;
          display: none;
        }

        .rad-fab {
          transition: transform .18s, box-shadow .18s;
        }

        .rad-fab:hover {
          transform: scale(1.1) !important;
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.20) !important;
        }

        .rad-fab:active {
          transform: scale(0.95) !important;
        }

        .rad-top {
          opacity: 0;
          pointer-events: none;
          transition: opacity .25s, transform .18s, box-shadow .18s;
        }

        .rad-top.rad-vis {
          opacity: 1;
          pointer-events: auto;
        }

        .rad-top:hover {
          transform: scale(1.1) !important;
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.20) !important;
        }

        .rad-tab-btn {
          transition: background .18s, color .18s, box-shadow .18s;
        }
      </style>
    </helmet>



    <div ref="{{ scrollRef }}" onscroll="{{ onScroll }}"
      style="position:relative;height:100dvh;width:100%;max-width:540px;margin:0 auto;overflow-y:auto;overflow-x:hidden;background:var(--bg,#FAF8F4);color:var(--ink,#1C1B19);font-family:var(--font-body,'Manrope',sans-serif);-webkit-overflow-scrolling:touch;">
      <button class="rad-fab" onclick="{{ toggleLang }}" aria-label="{{ langLabel }}"
        style="position:fixed;z-index:9000;width:52px;height:52px;border-radius:50%;background:var(--chip);border:1.5px solid var(--line);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 14px rgba(0,0,0,0.13);padding:0;bottom:88px;left:16px;flex-direction:column;gap:2px;"><svg
          width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M2 12h20" />
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
        </svg><span
          style="font-size:8px;font-weight:800;letter-spacing:.12em;line-height:1;font-family:Manrope,sans-serif;">{{
          langLabel }}</span></button><button class="rad-fab" onclick="{{ toggleTheme }}" aria-label="Toggle theme"
        style="position:fixed;z-index:9000;width:52px;height:52px;border-radius:50%;background:var(--chip);border:1.5px solid var(--line);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 14px rgba(0,0,0,0.13);padding:0;bottom:88px;right:16px;font-size:22px;line-height:1;">{{
        themeIcon }}</button><button class="rad-fab rad-top" id="rad-top-btn"
        style="position:fixed;z-index:9000;width:52px;height:52px;border-radius:50%;background:var(--chip);border:1.5px solid var(--line);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 14px rgba(0,0,0,0.13);padding:0;bottom:152px;right:16px;font-size:20px;font-weight:700;line-height:1;">&#8593;</button>

      <div style="padding:28px 22px 12px;text-align:center;">

        <div
          style="display:inline-flex;align-items:flex-start;font-family:var(--font-logo,'Manrope',sans-serif);font-weight:800;font-size:42px;letter-spacing:-.035em;line-height:1;color:var(--ink,#1C1B19);">
          <span>ra</span>
          <span
            style="background:var(--accent,#F2B100);color:#17150e;border-radius:9px;padding:0 .05em;margin:0 .01em;">do</span>
          <span style="position:relative;">st<span
              style="position:absolute;top:-.18em;right:-.62em;font-size:.26em;font-weight:700;letter-spacing:0;color:var(--sub,#9A9486);">™</span></span>
        </div>
        <div
          style="margin-top:12px;font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--sub,#9A9486);opacity:.8;">
          {{ tagline }}</div>
      </div>

      <div ref="{{ tabsRef }}"
        style="position:sticky;top:0;z-index:10;background:var(--bg,#FAF8F4);border-bottom:1px solid var(--line,#E9E4DB);">
        <div style="display:flex;gap:7px;overflow-x:auto;padding:11px 18px;">
          <sc-for list="{{ tabs }}" as="tab" hint-placeholder-count="5">
            <button onclick="{{ tab.onClick }}" style="{{ tab.style }}">{{ tab.label }}</button>
          </sc-for>
        </div>
      </div>

      <sc-for list="{{ categories }}" as="cat" hint-placeholder-count="5">
        <section ref="{{ cat.ref }}" style="padding:32px 22px 6px;">
          <div style="display:flex;align-items:center;gap:13px;margin-bottom:15px;">
            <h2
              style="margin:0;font-family:var(--font-display,'Playfair Display',serif);font-size:var(--title-size,25px);font-weight:var(--title-weight,600);text-transform:var(--title-transform,none);letter-spacing:var(--title-spacing,0);color:var(--ink,#1C1B19);line-height:1.05;">
              {{ cat.title }}</h2>
            <span style="flex:1;height:1px;background:var(--line,#E9E4DB);"></span>
          </div>
          <sc-for list="{{ cat.items }}" as="it" hint-placeholder-count="6">
            <div
              style="display:flex;justify-content:space-between;align-items:baseline;gap:14px;padding:11px 0;border-bottom:1px solid var(--line,#E9E4DB);">
              <div style="min-width:0;">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                  <span style="font-weight:600;font-size:15.5px;line-height:1.25;color:var(--ink,#1C1B19);">{{ it.name
                    }}</span>
                  <sc-if value="{{ it.vol }}" hint-placeholder-val="{{ false }}">
                    <span
                      style="font-size:10.5px;font-weight:600;color:var(--sub,#9A9486);background:var(--chip,#F1ECE3);border:1px solid var(--line,#E9E4DB);border-radius:5px;padding:1.5px 6px;letter-spacing:.02em;white-space:nowrap;">{{
                      it.vol }}</span>
                  </sc-if>
                  <sc-if value="{{ it.cold }}" hint-placeholder-val="{{ false }}">
                    <span title="served chilled"
                      style="color:var(--accent,#F2B100);font-size:14px;line-height:1;">❅</span>
                  </sc-if>
                </div>
                <sc-if value="{{ it.note }}" hint-placeholder-val="{{ false }}">
                  <div
                    style="font-size:11.5px;color:var(--sub,#9A9486);margin-top:3px;letter-spacing:.01em;line-height:1.3;">
                    {{ it.note }}</div>
                </sc-if>
              </div>
              <div style="display:flex;align-items:baseline;gap:3px;white-space:nowrap;">
                <span style="font-weight:700;font-size:15px;color:var(--ink,#1C1B19);">{{ it.price }}</span>
                <span style="font-size:11px;font-weight:700;color:var(--sub,#9A9486);letter-spacing:.04em;">{{ currency
                  }}</span>
              </div>
            </div>
          </sc-for>
        </section>
      </sc-for>

      <div style="padding:38px 22px 52px;text-align:center;">
        <div
          style="font-family:var(--font-display,'Playfair Display',serif);font-size:23px;font-weight:var(--title-weight,600);text-transform:var(--title-transform,none);letter-spacing:var(--title-spacing,0);color:var(--ink,#1C1B19);">
          З'УБО З'АРНО</div>
        <div

    const v = this.variant();
    const def = this.PAL[v];
    const p = def[this.state.theme];
    const set = (k,val)=>el.style.setProperty(k,val);
    set('--bg',p.bg); set('--ink',p.ink); set('--sub',p.sub); set('--line',p.line);

    set('--title-transform',def.titleTransform); set('--title-spacing',def.titleSpacing);
    if(document && document.body) document.body.style.background = p.bg;
  }

  componentDidMount(){ this.applyVars(); }
  componentDidUpdate(){ this.applyVars(); }

  onScroll = () => {
    if(this._t) return;
    this._t = requestAnimationFrame(()=>{ this._t=null; this.spy(); });
  };
  spy(){
    const sc = this.scrollRef.current; if(!sc) return;
    const tabsH = this.tabsRef.current ? this.tabsRef.current.offsetHeight : 56;
    const y = sc.scrollTop + tabsH + 28;
    let cur = this.DATA[0].id;
    for(const c of this.DATA){ const el=this.sections[c.id]; if(el && el.offsetTop <= y) cur=c.id; }
    if(cur !== this.state.active) this.setState({ active: cur });
  }
  scrollTo(id){
    const sc = this.scrollRef.current, el = this.sections[id];
    const tabsH = this.tabsRef.current ? this.tabsRef.current.offsetHeight : 56;
    if(sc && el) sc.scrollTo({ top: el.offsetTop - tabsH - 6, behavior:'smooth' });
    this.setState({ active: id });
  }

  tabStyles(){
    const v = this.variant();
    const base = { fontFamily:"'Manrope', sans-serif", whiteSpace:'nowrap', border:'none', cursor:'pointer', flex:'0 0 auto' };
    if(v === 'bold'){
      const b = { ...base, padding:'7px 14px', borderRadius:'999px', fontSize:'12px', fontWeight:700, textTransform:'uppercase', letterSpacing:'.04em' };
      return {
        active:{ ...b, background:'var(--accent)', color:'#16140D' },
        inactive:{ ...b, background:'var(--chip)', color:'var(--sub)' },
      };
    }
    const e = { ...base, padding:'6px 3px', background:'transparent', fontSize:'13px', fontWeight:600, letterSpacing:'.01em' };
    return {
      active:{ ...e, color:'var(--ink)', boxShadow:'inset 0 -2px 0 var(--accent)' },
      inactive:{ ...e, color:'var(--sub)' },
    };
  }

  switchStyle(on){
    return {
      fontFamily:"'Manrope', sans-serif", fontSize:'12px', fontWeight:700, letterSpacing:'.02em',
      border:'none', cursor:'pointer', borderRadius:'999px', padding:'6px 15px',
      background: on ? 'var(--accent)' : 'transparent',
      color: on ? '#16140D' : 'var(--sub)',
    };
  }

  refFor(id){ return this._refs[id] || (this._refs[id] = el => { if(el) this.sections[id]=el; }); }

  renderVals(){

    const ts = this.tabStyles();

      ref: this.refFor(c.id),
      items: c.items.map(it => ({
        name: lang==='mk' ? it.mk : it.en,
        vol: it.vol ? it.vol + ' L' : '',
        note: it.note ? (lang==='mk' ? it.note.mk : it.note.en) : '',
        cold: !!it.cold,
        price: it.price,
      })),
    }));
    const tabs = this.DATA.map(c => ({
      label: lang==='mk' ? c.tabMk : c.tabEn,
      onClick: () => this.scrollTo(c.id),
      style: this.state.active===c.id ? ts.active : ts.inactive,
    }));
    const v = this.variant();
    return {
      scrollRef:this.scrollRef, tabsRef:this.tabsRef, onScroll:this.onScroll,

    (function () {
      function boot() {
        var sc = document.querySelector('[style*="overflow-y:auto"]');
        var btn = document.getElementById('rad-top-btn');
        if (!sc || !btn) { setTimeout(boot, 300); return; }
        btn.addEventListener('click', function () { sc.scrollTo({ top: 0, behavior: 'smooth' }); });
        sc.addEventListener('scroll', function () {
          btn.classList.toggle('rad-vis', sc.scrollTop > 250);
        });
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
      else setTimeout(boot, 300);
    })();
